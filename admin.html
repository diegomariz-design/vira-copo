<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0a0a0a" />
<title>Vira Copo · Admin</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --preto:#0a0a0a; --preto2:#060606; --card:#141414; --card2:#1b1b1b; --card3:#222;
    --vermelho:#ff0033; --vermelho2:#ff2d55; --ouro:#ffcf4a;
    --branco:#ffffff; --cinza:#b8b8b8; --cinza2:#7a7a7a;
    --ok:#27c93f; --warn:#ff9a3d; --info:#3da5ff;
    --borda:rgba(255,0,51,.16); --borda2:rgba(255,255,255,.08);
    --shadow:0 10px 30px rgba(0,0,0,.5);
    --sidebar:236px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--preto);color:var(--branco);-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;} button{font-family:inherit;cursor:pointer;border:none;}
  ::-webkit-scrollbar{width:9px;height:9px;} ::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:9px;}
  .neon{color:var(--vermelho);text-shadow:0 0 14px var(--vermelho2);}

  /* ===== LOGIN ===== */
  .login{position:fixed;inset:0;z-index:100;display:grid;place-items:center;padding:24px;
    background:radial-gradient(700px 360px at 50% -10%, rgba(255,0,51,.22), transparent 60%), var(--preto);}
  .login-card{width:100%;max-width:360px;text-align:center;background:linear-gradient(180deg,var(--card),var(--preto));
    border:1px solid var(--borda);border-radius:22px;padding:34px 26px;box-shadow:0 0 44px rgba(255,0,51,.25);}
  .login-logo{font-size:30px;font-weight:900;letter-spacing:-1px;margin-bottom:2px;}
  .login-sub{color:var(--cinza2);font-size:12px;text-transform:uppercase;letter-spacing:2px;margin-bottom:20px;}
  .login input{width:100%;background:var(--preto);border:1px solid var(--borda2);border-radius:12px;color:#fff;
    padding:14px;font-size:18px;text-align:center;letter-spacing:6px;outline:none;margin-bottom:6px;}
  .login input:focus{border-color:var(--vermelho);box-shadow:0 0 0 3px rgba(255,0,51,.15);}
  .login .who{letter-spacing:0;font-size:15px;text-align:left;}
  .login-btn{width:100%;margin-top:12px;padding:14px;border-radius:12px;font-weight:800;font-size:16px;color:#fff;
    background:linear-gradient(180deg,var(--vermelho2),var(--vermelho));box-shadow:0 6px 22px rgba(255,0,51,.4);}
  .login-err{color:var(--vermelho2);font-size:13px;min-height:18px;margin-top:8px;}
  .login-hint{color:var(--cinza2);font-size:11px;margin-top:14px;}

  /* ===== SHELL ===== */
  .shell{display:none;min-height:100vh;}
  .shell.on{display:block;}
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar);background:var(--preto2);
    border-right:1px solid var(--borda2);display:flex;flex-direction:column;z-index:50;transition:transform .25s;}
  .sb-brand{padding:18px 18px 14px;font-size:20px;font-weight:900;letter-spacing:-.5px;border-bottom:1px solid var(--borda2);}
  .sb-brand small{display:block;font-size:9px;color:var(--cinza2);letter-spacing:2px;font-weight:700;margin-top:1px;}
  .sb-nav{flex:1;overflow-y:auto;padding:10px 10px 20px;}
  .sb-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;color:var(--cinza);
    font-size:14px;font-weight:600;cursor:pointer;margin-bottom:2px;transition:.15s;}
  .sb-item .ic{width:20px;text-align:center;font-size:16px;}
  .sb-item:hover{background:var(--card);color:#fff;}
  .sb-item.active{background:linear-gradient(145deg,var(--vermelho2),var(--vermelho));color:#fff;box-shadow:0 4px 16px rgba(255,0,51,.35);}
  .sb-item .badge{margin-left:auto;background:rgba(255,255,255,.18);border-radius:999px;font-size:11px;padding:1px 8px;font-weight:800;}
  .sb-foot{padding:12px 16px;border-top:1px solid var(--borda2);font-size:12px;color:var(--cinza2);}
  .sb-foot b{color:#fff;font-weight:700;}
  .sb-logout{color:var(--vermelho2);cursor:pointer;font-weight:700;margin-top:4px;display:inline-block;}

  .main{margin-left:var(--sidebar);min-height:100vh;display:flex;flex-direction:column;}
  .topbar{position:sticky;top:0;z-index:40;background:rgba(10,10,10,.92);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--borda2);padding:13px 20px;display:flex;align-items:center;gap:14px;}
  .burger{display:none;background:var(--card);border:1px solid var(--borda2);color:#fff;width:38px;height:38px;border-radius:10px;font-size:18px;}
  .topbar h1{font-size:18px;margin:0;font-weight:800;}
  .topbar .search{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--borda2);
    border-radius:11px;padding:8px 12px;min-width:160px;}
  .topbar .search input{background:none;border:none;color:#fff;outline:none;font-size:13px;width:100%;}
  .topbar .pulse{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ok);font-weight:700;}
  .topbar .pulse .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);animation:bl 1.6s infinite;}
  @keyframes bl{50%{opacity:.35;}}
  .content{padding:20px;flex:1;}

  /* ===== CARDS / KPIs ===== */
  .kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;}
  .kpi{background:linear-gradient(165deg,var(--card2),var(--card));border:1px solid var(--borda2);border-radius:16px;padding:16px;position:relative;overflow:hidden;}
  .kpi .lbl{font-size:12px;color:var(--cinza2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
  .kpi .val{font-size:26px;font-weight:900;margin-top:6px;}
  .kpi .sub{font-size:12px;color:var(--cinza);margin-top:3px;}
  .kpi .ic{position:absolute;right:14px;top:14px;font-size:22px;opacity:.5;}
  .kpi.accent{border-color:var(--borda);box-shadow:0 0 22px rgba(255,0,51,.12);}
  .kpi.gold .val{color:var(--ouro);}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;}
  .grid3{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-top:16px;}
  .panel{background:var(--card);border:1px solid var(--borda2);border-radius:16px;padding:16px;}
  .panel h3{margin:0 0 12px;font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;}
  .panel h3 .mut{margin-left:auto;font-size:12px;color:var(--cinza2);font-weight:600;}
  .chart-wrap{position:relative;height:240px;}
  .mini-list{display:flex;flex-direction:column;gap:9px;}
  .mini-row{display:flex;align-items:center;gap:10px;font-size:13px;}
  .mini-row .nm{flex:1;}
  .mini-row .bar{height:7px;border-radius:6px;background:linear-gradient(90deg,var(--vermelho2),var(--vermelho));}
  .mini-row .vv{color:var(--cinza);font-weight:700;min-width:38px;text-align:right;}

  /* ===== KANBAN ===== */
  .kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:14px;align-items:flex-start;}
  .kcol{flex:0 0 280px;background:var(--preto2);border:1px solid var(--borda2);border-radius:16px;display:flex;flex-direction:column;max-height:calc(100vh - 150px);}
  .kcol-head{padding:13px 14px;border-bottom:1px solid var(--borda2);display:flex;align-items:center;gap:8px;position:sticky;top:0;}
  .kcol-head .dotc{width:9px;height:9px;border-radius:50%;}
  .kcol-head .t{font-size:13px;font-weight:800;}
  .kcol-head .c{margin-left:auto;background:var(--card3);border-radius:999px;font-size:11px;font-weight:800;padding:2px 9px;color:var(--cinza);}
  .kcol-body{overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px;}
  .kcard{background:linear-gradient(165deg,var(--card2),var(--card));border:1px solid var(--borda2);border-radius:13px;padding:12px;cursor:pointer;transition:.12s;}
  .kcard:hover{border-color:var(--borda);transform:translateY(-2px);}
  .kcard .kh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .kcard .num{font-weight:900;font-size:14px;}
  .kcard .time{font-size:11px;color:var(--cinza2);}
  .kcard .cli{font-size:13px;font-weight:700;}
  .kcard .addr{font-size:11.5px;color:var(--cinza);margin-top:2px;line-height:1.35;}
  .kcard .ktot{font-size:15px;font-weight:900;color:var(--ouro);margin-top:7px;}
  .kcard .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
  .tag{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;border:1px solid var(--borda2);color:var(--cinza);}
  .tag.pay{color:var(--info);border-color:rgba(61,165,255,.35);}
  .tag.doc-ok{color:var(--ok);border-color:rgba(39,201,63,.35);}
  .tag.doc-pend{color:var(--warn);border-color:rgba(255,154,61,.4);}
  .tag.alc{color:var(--vermelho2);border-color:var(--borda);}

  /* ===== TABLES ===== */
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--cinza2);font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;border-bottom:1px solid var(--borda2);}
  td{padding:11px 12px;border-bottom:1px solid var(--borda2);}
  tr:hover td{background:rgba(255,255,255,.02);}
  .t-wrap{background:var(--card);border:1px solid var(--borda2);border-radius:16px;overflow:hidden;}
  .t-scroll{overflow-x:auto;}

  /* chips / pills */
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:800;padding:3px 10px;border-radius:999px;}
  .pill.on{background:rgba(39,201,63,.14);color:var(--ok);} .pill.off{background:rgba(255,80,80,.12);color:#ff7a7a;}
  .pill.muted{background:var(--card3);color:var(--cinza);}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border-radius:11px;font-weight:800;font-size:13px;}
  .btn-red{background:linear-gradient(145deg,var(--vermelho2),var(--vermelho));color:#fff;box-shadow:0 4px 16px rgba(255,0,51,.32);}
  .btn-ghost{background:var(--card);border:1px solid var(--borda2);color:#fff;}
  .btn-gold{background:linear-gradient(145deg,#ffd96b,var(--ouro));color:#1a1400;}
  .btn-sm{padding:6px 10px;font-size:12px;border-radius:9px;}
  .btn-wa{background:#1faa52;color:#fff;}
  .row-actions{display:flex;gap:6px;flex-wrap:wrap;}

  .page-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .page-head .sp{flex:1;}
  .filters{display:flex;gap:8px;flex-wrap:wrap;}
  .filters select,.filters input{background:var(--card);border:1px solid var(--borda2);color:#fff;border-radius:10px;padding:8px 11px;font-size:12.5px;outline:none;}

  /* ===== MODAL ===== */
  .overlay{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.66);opacity:0;pointer-events:none;transition:.2s;}
  .overlay.on{opacity:1;pointer-events:auto;}
  .modal{position:fixed;z-index:70;top:50%;left:50%;transform:translate(-50%,-46%) scale(.97);opacity:0;pointer-events:none;
    width:min(560px,94vw);max-height:90vh;overflow-y:auto;background:var(--card);border:1px solid var(--borda);border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,.7);transition:.2s;}
  .modal.on{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1);}
  .modal-head{position:sticky;top:0;background:var(--card);padding:16px 18px;border-bottom:1px solid var(--borda2);display:flex;align-items:center;justify-content:space-between;z-index:2;}
  .modal-head h3{margin:0;font-size:17px;}
  .modal-x{background:var(--card3);color:#fff;width:32px;height:32px;border-radius:9px;font-size:16px;}
  .modal-body{padding:16px 18px;}
  .modal-foot{position:sticky;bottom:0;background:var(--card);padding:14px 18px;border-top:1px solid var(--borda2);display:flex;gap:10px;justify-content:flex-end;}

  label.f{display:block;font-size:12px;color:var(--cinza);font-weight:700;margin:12px 0 5px;}
  .inp{width:100%;background:var(--preto);border:1px solid var(--borda2);color:#fff;border-radius:11px;padding:11px 12px;font-size:14px;outline:none;font-family:inherit;}
  .inp:focus{border-color:var(--vermelho);box-shadow:0 0 0 3px rgba(255,0,51,.13);}
  textarea.inp{resize:vertical;min-height:54px;}
  .ff2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .ff3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .switch{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--cinza);margin-top:10px;}
  .switch input{width:18px;height:18px;accent-color:var(--vermelho);}

  /* order detail */
  .od-items{background:var(--preto);border:1px solid var(--borda2);border-radius:12px;padding:12px;margin-top:6px;font-size:13px;}
  .od-items .it{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed var(--borda2);}
  .od-items .it:last-child{border-bottom:none;}
  .od-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:13px;margin-top:6px;}
  .od-grid .k{color:var(--cinza2);font-size:11px;text-transform:uppercase;letter-spacing:.4px;}
  .status-flow{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
  .sf-btn{font-size:12px;font-weight:700;padding:7px 11px;border-radius:9px;background:var(--card2);border:1px solid var(--borda2);color:var(--cinza);}
  .sf-btn.cur{background:linear-gradient(145deg,var(--vermelho2),var(--vermelho));color:#fff;border-color:transparent;}
  .hist{margin-top:10px;font-size:12px;color:var(--cinza);}
  .hist .h{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--borda2);}
  .hist .h .tm{color:var(--cinza2);min-width:96px;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(120%);z-index:90;background:#111;border:1px solid var(--borda);
    color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:700;box-shadow:var(--shadow);transition:.25s;}
  .toast.on{transform:translateX(-50%) translateY(0);}
  .empty-st{text-align:center;color:var(--cinza2);padding:40px;font-size:13px;}

  .cfg-banner{background:rgba(61,165,255,.1);border:1px solid rgba(61,165,255,.3);color:#bfe0ff;border-radius:12px;padding:11px 14px;font-size:12.5px;margin-bottom:16px;display:flex;gap:9px;align-items:center;}
  .cfg-banner.warn{background:rgba(255,154,61,.1);border-color:rgba(255,154,61,.35);color:#ffd9b0;}

  @media(max-width:860px){
    :root{--sidebar:0px;}
    .sidebar{transform:translateX(-100%);width:240px;}
    .sidebar.open{transform:translateX(0);}
    .main{margin-left:0;}
    .burger{display:inline-flex;align-items:center;justify-content:center;}
    .grid2,.grid3{grid-template-columns:1fr;}
    .topbar .search{display:none;}
    .scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:45;display:none;}
    .scrim.on{display:block;}
  }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="login" id="login">
  <div class="login-card">
    <div class="login-logo">VIRA<span class="neon">COPO</span></div>
    <div class="login-sub">Painel Administrativo</div>
    <input class="who" id="loginUser" type="text" placeholder="Usuário" autocomplete="username" />
    <input class="who" id="loginPass" type="password" placeholder="Senha" autocomplete="current-password" />
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-hint">Acesso restrito à equipe da adega.</div>
  </div>
</div>

<!-- ===== APP SHELL ===== -->
<div class="shell" id="shell">
  <div class="scrim" id="scrim" onclick="toggleSidebar(false)"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">VIRA<span class="neon">COPO</span><small>ADMIN · ADEGA</small></div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-foot">
      <div>Operador: <b id="opName">—</b></div>
      <span class="sb-logout" onclick="logout()">Sair</span>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="burger" onclick="toggleSidebar(true)">☰</button>
      <h1 id="pageTitle">Dashboard</h1>
      <div class="pulse"><span class="dot"></span> <span id="liveLabel">demo</span></div>
      <div class="search"><span>🔎</span><input id="globalSearch" placeholder="Buscar pedido, cliente, telefone..." oninput="onGlobalSearch(this.value)"/></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- ===== MODAL ===== -->
<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
  <div class="modal-head"><h3 id="modalTitle">—</h3><button class="modal-x" onclick="closeModal()">✕</button></div>
  <div class="modal-body" id="modalBody"></div>
  <div class="modal-foot" id="modalFoot"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   VIRA COPO ADMIN — config + dados (demo localStorage / Supabase-ready)
   ============================================================ */
const CONFIG = {
  // Preencher quando o Supabase estiver pronto (chave anon é pública/segura no client):
  supabaseUrl: "",
  supabaseKey: "",
  pin: "2580",
  adminUser: "admin",
  adminPass: "151010",
  loja: {
    nome:"Vira Copo Delivery", whatsapp:"5516992058378",
    endereco:"Rua da Adega, 100 - Centro", horario:"18h - 02h (todos os dias)",
    taxa:7.00, minimo:25.00, tempoMedio:"30-50 min",
    bairros:"Centro, Jardim, Vila Nova, São José", cnpj:"00.000.000/0001-00"
  }
};

/* status do pedido (kanban) */
const STATUSES = [
  {key:"novo",        label:"Novo pedido",         color:"#3da5ff"},
  {key:"atendimento", label:"Em atendimento",      color:"#9b6dff"},
  {key:"pagamento",   label:"Aguardando pagamento", color:"#ffcf4a"},
  {key:"separando",   label:"Separando pedido",    color:"#ff9a3d"},
  {key:"entrega",     label:"Saiu para entrega",   color:"#ff2d55"},
  {key:"entregue",    label:"Entregue",            color:"#27c93f"},
  {key:"cancelado",   label:"Cancelado",           color:"#ff5a5a"},
];
const ST = Object.fromEntries(STATUSES.map(s=>[s.key,s]));
const DELIVERY_ST = ["Aguardando despacho","Em rota","Entregue","Falha na entrega","Cancelado"];
const CATEGORIES = ["Cervejas","Destilados","Vinhos","Energéticos","Refrigerantes","Gelo","Combos","Promoções","Sem álcool","Diversos"];
const PAGAMENTOS = ["Pix","Cartão","Dinheiro"];

/* mensagens automáticas de WhatsApp por status */
function waMsg(status, o){
  const n=o.numero, nome=(o.cliente||"").split(" ")[0]||"cliente", tempo=CONFIG.loja.tempoMedio;
  const M = {
    novo:`Olá, ${nome}. Seu pedido #${n} foi recebido pela Vira Copo Delivery. Estamos conferindo tudo por aqui. 🍻`,
    atendimento:`Oi, ${nome}! Já estamos cuidando do seu pedido #${n}. Qualquer ajuste, é só responder por aqui.`,
    pagamento:`${nome}, o pedido #${n} está aguardando o pagamento para seguir. Pode mandar o comprovante por aqui quando fizer o Pix. 💠`,
    separando:`Seu pedido #${n} já está sendo separado. Já deixa o copo preparado, sem cometer crimes contra a logística. 🧊`,
    entrega:`Seu pedido #${n} saiu para entrega. Previsão: ${tempo}. Lembre-se: documento com foto será solicitado no recebimento. 🪪🛵`,
    entregue:`Pedido #${n} entregue. Obrigado por comprar na Vira Copo Delivery. Beba com moderação. 🍻`,
    cancelado:`Seu pedido #${n} foi cancelado. Motivo: ${o.motivoCancel||"não informado"}. Qualquer dúvida estamos por aqui.`,
  };
  return M[status]||"";
}

/* ===== helpers ===== */
const brl = v => "R$ " + (Number(v)||0).toFixed(2).replace(".",",");
const uid = (p) => p+"_"+Math.random().toString(36).slice(2,9);
const pad4 = n => String(n).padStart(4,"0");
function nowISO(){ return new Date().toISOString(); }
function fmtTime(iso){ const d=new Date(iso); return d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}); }
function fmtDate(iso){ const d=new Date(iso); return d.toLocaleDateString("pt-BR"); }
function fmtDateTime(iso){ return fmtDate(iso)+" "+fmtTime(iso); }
function timeAgo(iso){ const s=(Date.now()-new Date(iso).getTime())/1000;
  if(s<60)return "agora"; if(s<3600)return Math.floor(s/60)+" min"; if(s<86400)return Math.floor(s/3600)+"h"; return Math.floor(s/86400)+"d"; }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function isToday(iso){ return iso.slice(0,10)===todayStr(); }

function sbHeaders(extra){ return Object.assign({apikey:SUPA_ADMIN.key,Authorization:"Bearer "+SUPA_ADMIN.key,"Content-Type":"application/json"}, extra||{}); }
function sbRowToOrder(r){ return {id:r.id,numero:r.numero,cliente:r.cliente,whatsapp:r.whatsapp,endereco:r.endereco,bairro:r.bairro,

function sbOrderToRow(o){ return {numero:o.numero,cliente:o.cliente,whatsapp:o.whatsapp,endereco:o.endereco,bairro:o.bairro,
  pagamento:o.pagamento,troco:o.troco,itens:o.itens,subtotal:o.subtotal,taxa:o.taxa,total:o.total,obs:o.obs,status:o.status,
  maioridade:o.maioridade,doc_conferido:o.docConferido,entrega_autorizada:o.entregaAutorizada,motivo_cancel:o.motivoCancel,
  entregador:o.entregador,historico:o.historico}; }
function sbPatchOrder(o){ if(!sbActive()||!o.id||String(o.id).indexOf("o_")===0) return;
  fetch(SUPA_ADMIN.url+"/rest/v1/orders?id=eq."+o.id,{method:"PATCH",headers:sbHeaders({Prefer:"return=minimal"}),body:JSON.stringify(sbOrderToRow(o))}).catch(e=>console.warn("patch falhou",e)); }
function sbPostOrder(o){ return fetch(SUPA_ADMIN.url+"/rest/v1/orders",{method:"POST",headers:sbHeaders({Prefer:"return=representation"}),body:JSON.stringify(sbOrderToRow(o))}).then(r=>r.json()); }
let SB_POLL=null;
function sbSyncOrders(){
  if(!sbActive()) return Promise.resolve();
  return fetch(SUPA_ADMIN.url+"/rest/v1/orders?select=*&order=created_at.desc",{headers:sbHeaders()}).then(r=>r.json()).then(rows=>{
    if(Array.isArray(rows)){ DB.orders=rows.map(sbRowToOrder); store.save();
      if(["pedidos","dashboard","financeiro","entregas","clientes"].indexOf(CURRENT)>=0) VIEWS[CURRENT]();
      renderSidebar(); }
  }).catch(e=>console.warn("sync falhou",e));
}
function sbStartPolling(){ if(SB_POLL||!sbActive()) return; SB_POLL=setInterval(sbSyncOrders, 10000); }

  const err=document.getElementById("loginErr");
  if(u===CONFIG.adminUser && p===CONFIG.adminPass){

let CHARTS=[];
function killCharts(){ CHARTS.forEach(c=>{try{c.destroy()}catch(e){}}); CHARTS=[]; }
function catOfItem(nome){ const p=DB.products.find(p=>p.nome===nome); return p?p.categoria:"Diversos"; }

function metrics(){
  const orders=DB.orders;
  const hoje=orders.filter(o=>isToday(o.criadoEm));
  const validos=hoje.filter(o=>o.status!=="cancelado");
  const fat=validos.reduce((s,o)=>s+o.total,0);
  const entregues=orders.filter(o=>o.status==="entregue");
  const cancelados=orders.filter(o=>o.status==="cancelado");
  const aberto=orders.filter(o=>!["entregue","cancelado"].includes(o.status));
  // produtos mais vendidos
  const vend={}; orders.forEach(o=>{ if(o.status==="cancelado")return; o.itens.forEach(i=>{ vend[i.n]=(vend[i.n]||0)+i.q; }); });
  const topProd=Object.entries(vend).sort((a,b)=>b[1]-a[1]).slice(0,5);
  // pagamentos
  const pag={}; orders.forEach(o=>{ if(o.status==="cancelado")return; pag[o.pagamento]=(pag[o.pagamento]||0)+1; });
  // por categoria (faturamento)
  const cat={}; orders.forEach(o=>{ if(o.status==="cancelado")return; o.itens.forEach(i=>{ const c=catOfItem(i.n); cat[c]=(cat[c]||0)+i.p*i.q; }); });
  return {hoje,validos,fat,entregues,cancelados,aberto,topProd,pag,cat,
    ticket: validos.length?fat/validos.length:0};
}

function matchOrder(o){
  if(!SEARCH) return true;
  return (o.numero+" "+o.cliente+" "+o.whatsapp+" "+o.bairro+" "+ST[o.status].label).toLowerCase().includes(SEARCH);
}
function docTag(o){
  if(o.docConferido===true) return '<span class="tag doc-ok">🪪 doc conferido</span>';
  if(o.docConferido===false) return '<span class="tag doc-pend">🪪 sem doc</span>';
  return '<span class="tag doc-pend">🪪 conferir na entrega</span>';
}

function categoriesModal(){

function renderCatList(){
  if(!DB.categories.length) return '<div class="empty-st" style="padding:14px">Nenhuma categoria.</div>';
  return DB.categories.map(function(c,i){
    var n=DB.products.filter(function(p){return p.categoria===c;}).length;
    return '<div style="display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--borda2)">'+
      '<input class="inp" style="flex:1;padding:8px" value="'+c.replace(/"/g,"&quot;")+'" onchange="renameCat('+i+',this.value)"/>'+
      '<span style="font-size:11px;color:var(--cinza2);min-width:58px;text-align:right">'+n+' prod.</span>'+
      '<button class="btn btn-ghost btn-sm" onclick="delCat('+i+')">✕</button></div>';
  }).join("");
}
function addCat(){ var v=(document.getElementById("newCat").value||"").trim(); if(!v)return;
  if(DB.categories.indexOf(v)>=0){ toast("Categoria já existe."); return; }
  DB.categories.push(v); store.save(); document.getElementById("catList").innerHTML=renderCatList(); document.getElementById("newCat").value=""; toast("Categoria adicionada."); }
function renameCat(i,v){ v=(v||"").trim(); if(!v)return; var old=DB.categories[i]; if(v===old)return;
  if(DB.categories.indexOf(v)>=0){ toast("Já existe categoria com esse nome."); document.getElementById("catList").innerHTML=renderCatList(); return; }
  DB.categories[i]=v; DB.products.forEach(function(p){ if(p.categoria===old) p.categoria=v; }); store.save();
  document.getElementById("catList").innerHTML=renderCatList(); toast("Renomeada (produtos atualizados)."); }
function delCat(i){ var c=DB.categories[i]; var n=DB.products.filter(function(p){return p.categoria===c;}).length;
  if(n>0 && !confirm('"'+c+'" tem '+n+' produto(s). Excluir a categoria? Os produtos continuam, mas sem essa categoria.')) return;
  DB.categories.splice(i,1); store.save(); document.getElementById("catList").innerHTML=renderCatList(); toast("Categoria excluída."); }
function pField(l,id,v,t="text",ph=""){ return `<label class="f">${l}</label><input class="inp" id="${id}" type="${t}" value="${v??""}" placeholder="${ph}"/>`; }
let IMG_TMP="";
function imgField(cur){ IMG_TMP=cur||"";
  return `<label class="f">Foto do produto</label>
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:2px">
      <img id="imgPreview" src="${IMG_TMP}" style="width:64px;height:64px;border-radius:12px;object-fit:cover;border:1px solid var(--borda2);background:var(--card2);${IMG_TMP?"":"display:none"}"/>
      <div style="flex:1"><input type="file" accept="image/*" id="imgInput" onchange="pickImage(this)" style="font-size:12px;color:var(--cinza);width:100%"/>
        <div style="font-size:11px;color:var(--cinza2);margin-top:3px">JPG/PNG do seu aparelho · redimensiona sozinho</div></div>
      <button class="btn btn-ghost btn-sm" type="button" id="imgClear" onclick="clearImage()" style="${IMG_TMP?"":"display:none"}">Remover</button>
    </div>`;
}
function pickImage(input){
  var file=input.files&&input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var max=480, scale=Math.min(1,max/Math.max(img.width,img.height));
      var cv=document.createElement("canvas"); cv.width=Math.round(img.width*scale); cv.height=Math.round(img.height*scale);
      cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
      IMG_TMP=cv.toDataURL("image/jpeg",0.72);
      var pv=document.getElementById("imgPreview"); if(pv){ pv.src=IMG_TMP; pv.style.display=""; }
      var cl=document.getElementById("imgClear"); if(cl) cl.style.display="";
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function clearImage(){ IMG_TMP=""; var pv=document.getElementById("imgPreview"); if(pv){pv.src="";pv.style.display="none";} var cl=document.getElementById("imgClear"); if(cl)cl.style.display="none"; var inp=document.getElementById("imgInput"); if(inp)inp.value=""; }

let IMGS={};
function imgSlot(key,label,cur){ IMGS[key]=cur||"";
  return `<label class="f">${label}</label><div style="display:flex;gap:10px;align-items:center;margin-bottom:2px">
    <img id="prev_${key}" src="${IMGS[key]}" style="width:54px;height:54px;border-radius:10px;object-fit:cover;border:1px solid var(--borda2);background:var(--card2);${IMGS[key]?"":"display:none"}"/>
    <input type="file" accept="image/*" id="in_${key}" onchange="pickImg('${key}',this)" style="font-size:12px;color:var(--cinza)"/>
    <button class="btn btn-ghost btn-sm" type="button" id="clr_${key}" onclick="clearImg('${key}')" style="${IMGS[key]?"":"display:none"}">✕</button></div>`; }
function pickImg(key,input){ var fl=input.files&&input.files[0]; if(!fl)return; var rd=new FileReader();
  rd.onload=function(e){ var img=new Image(); img.onload=function(){ var mx=640,sc=Math.min(1,mx/Math.max(img.width,img.height));
    var cv=document.createElement("canvas"); cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
    cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height); IMGS[key]=cv.toDataURL("image/jpeg",0.7);
    var pv=document.getElementById("prev_"+key); if(pv){pv.src=IMGS[key];pv.style.display="";} var cl=document.getElementById("clr_"+key); if(cl)cl.style.display=""; }; img.src=e.target.result; }; rd.readAsDataURL(fl); }
function clearImg(key){ IMGS[key]=""; var pv=document.getElementById("prev_"+key); if(pv){pv.src="";pv.style.display="none";} var cl=document.getElementById("clr_"+key); if(cl)cl.style.display="none"; var inp=document.getElementById("in_"+key); if(inp)inp.value=""; }
function fileSlot(key,label,cur,curName){ IMGS[key]=cur||""; IMGS[key+"_n"]=curName||"";
  return `<label class="f">${label}</label><div style="display:flex;gap:10px;align-items:center;margin-bottom:2px">
    <input type="file" accept=".pdf,image/*" id="in_${key}" onchange="pickFile('${key}',this)" style="font-size:12px;color:var(--cinza)"/>
    <a id="lnk_${key}" href="${IMGS[key]||'#'}" target="_blank" class="btn btn-ghost btn-sm" style="${IMGS[key]?"":"display:none"}">📄 ${IMGS[key+"_n"]||"ver"}</a>
    <button class="btn btn-ghost btn-sm" type="button" id="clrf_${key}" onclick="clearFile('${key}')" style="${IMGS[key]?"":"display:none"}">✕</button></div>`; }
function pickFile(key,input){ var fl=input.files&&input.files[0]; if(!fl)return; var rd=new FileReader();
  rd.onload=function(e){ IMGS[key]=e.target.result; IMGS[key+"_n"]=fl.name; var ln=document.getElementById("lnk_"+key); if(ln){ln.href=IMGS[key];ln.textContent="📄 "+fl.name;ln.style.display="";} var cl=document.getElementById("clrf_"+key); if(cl)cl.style.display=""; toast("Anexado: "+fl.name); }; rd.readAsDataURL(fl); }
function clearFile(key){ IMGS[key]="";IMGS[key+"_n"]=""; var ln=document.getElementById("lnk_"+key); if(ln)ln.style.display="none"; var cl=document.getElementById("clrf_"+key); if(cl)cl.style.display="none"; var inp=document.getElementById("in_"+key); if(inp)inp.value=""; }

VIEWS.financeiro=function(){
  const valid=DB.orders.filter(o=>o.status!=="cancelado");
  const now=new Date(); const weekAgo=Date.now()-7*86400000;
  const sum=arr=>arr.reduce((s,o)=>s+o.total,0);
  const day=valid.filter(o=>isToday(o.criadoEm));
  const week=valid.filter(o=>new Date(o.criadoEm).getTime()>=weekAgo);
  const month=valid.filter(o=>{const d=new Date(o.criadoEm);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const byPag=p=>sum(valid.filter(o=>o.pagamento===p));
  const taxas=sum(valid)-valid.reduce((s,o)=>s+o.subtotal,0)+0; const taxaTot=valid.reduce((s,o)=>s+o.taxa,0);
  const cancel=DB.orders.filter(o=>o.status==="cancelado"); const cancelVal=cancel.reduce((s,o)=>s+o.total,0);
  const ticket=day.length?sum(day)/day.length:0;
  const lucro={}; valid.forEach(o=>o.itens.forEach(i=>{lucro[i.n]=(lucro[i.n]||0)+i.p*i.q;}));
  const topLucro=Object.entries(lucro).sort((a,b)=>b[1]-a[1]).slice(0,6);
  document.getElementById("content").innerHTML=`
    <div class="kpis">
      <div class="kpi gold"><div class="lbl">Faturamento dia</div><div class="val">${brl(sum(day))}</div><span class="ic">📅</span></div>
      <div class="kpi"><div class="lbl">Faturamento semana</div><div class="val">${brl(sum(week))}</div><span class="ic">🗓️</span></div>
      <div class="kpi"><div class="lbl">Faturamento mês</div><div class="val">${brl(sum(month))}</div><span class="ic">📆</span></div>
      <div class="kpi"><div class="lbl">Ticket médio (dia)</div><div class="val">${brl(ticket)}</div><span class="ic">🎯</span></div>
      <div class="kpi"><div class="lbl">💠 Pix</div><div class="val" style="font-size:21px">${brl(byPag("Pix"))}</div></div>
      <div class="kpi"><div class="lbl">💳 Cartão</div><div class="val" style="font-size:21px">${brl(byPag("Cartão"))}</div></div>
      <div class="kpi"><div class="lbl">💵 Dinheiro</div><div class="val" style="font-size:21px">${brl(byPag("Dinheiro"))}</div></div>
      <div class="kpi"><div class="lbl">🛵 Taxas de entrega</div><div class="val" style="font-size:21px">${brl(taxaTot)}</div></div>
      <div class="kpi"><div class="lbl">Cancelados</div><div class="val" style="font-size:21px;color:#ff7a7a">${cancel.length} · ${brl(cancelVal)}</div></div>
    </div>
    <div class="panel" style="margin-top:16px"><h3>🏆 Produtos mais lucrativos</h3><div class="mini-list">${
      topLucro.map(([n,v])=>{const max=topLucro[0][1];return `<div class="mini-row"><span class="nm">${n}</span><span class="bar" style="width:${Math.max(18,v/max*160)}px;background:linear-gradient(90deg,#ffd96b,#ffcf4a)"></span><span class="vv">${brl(v)}</span></div>`;}).join("")
    }</div></div>`;
};

function saveSettings(){ const g=x=>document.getElementById(x); const s=DB.settings;
  s.nome=g("s_nome").value; s.whatsapp=g("s_wpp").value; s.cnpj=g("s_cnpj").value; s.endereco=g("s_end").value;
  s.horario=g("s_hor").value; s.taxa=parseFloat(g("s_taxa").value)||0; s.minimo=parseFloat(g("s_min").value)||0;
  s.tempoMedio=g("s_tempo").value; s.bairros=g("s_bairros").value; s.msgPadrao=g("s_msg").value; s.aviso18=g("s_aviso").value; s.politicaEntrega=g("s_pol").value;
  Object.assign(CONFIG.loja,{nome:s.nome,whatsapp:s.whatsapp,tempoMedio:s.tempoMedio,msgPadrao:s.msgPadrao}); store.save(); toast("Configurações salvas."); }
function saveSupa(){ CONFIG.supabaseUrl=document.getElementById("sb_url").value.trim(); CONFIG.supabaseKey=document.getElementById("sb_key").value.trim();
  DB.settings.supabaseUrl=CONFIG.supabaseUrl; DB.settings.supabaseKey=CONFIG.supabaseKey; store.save();

/* ============================================================
   PEDIDO MANUAL
   ============================================================ */
function buscaCep(v){
  var cep=(v||"").replace(/\D/g,"");
  if(cep.length!==8) return;
  fetch("https://viacep.com.br/ws/"+cep+"/json/").then(function(r){return r.json();}).then(function(d){
    if(!d || d.erro){ toast("CEP n\u00e3o encontrado."); return; }
    var end=document.getElementById("no_end"), bai=document.getElementById("no_bairro");
    if(end && d.logradouro) end.value=d.logradouro;
    if(bai && d.bairro) bai.value=d.bairro;
    var num=document.getElementById("no_num"); if(num) num.focus();
    toast("Endere\u00e7o preenchido pelo CEP: "+(d.localidade||"")+"/"+(d.uf||""));
  }).catch(function(){ toast("Erro ao buscar CEP."); });
}
function newOrderModal(){
  openModal("Pedido manual",
    `${pField("Cliente","no_nome","")}
     ${pField("WhatsApp","no_wpp","")}
     <div class="ff2"><div><label class="f">CEP</label><input class="inp" id="no_cep" inputmode="numeric" maxlength="9" placeholder="00000-000" oninput="buscaCep(this.value)"/></div><div>${pField("Número","no_num","")}</div></div>
     ${pField("Endereço (rua)","no_end","")}
     ${pField("Bairro","no_bairro","")}
     <div class="ff2"><div><label class="f">Pagamento</label><select class="inp" id="no_pag">${PAGAMENTOS.map(p=>`<option>${p}</option>`).join("")}</select></div><div>${pField("Total (R$)","no_total","","number")}</div></div>
     ${pField("Itens (texto livre)","no_itens","","text","2x Heineken, 1x Gelo...")}
     ${pField("Observações","no_obs","")}`,
    `<button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancelar</button><button class="btn btn-red" onclick="saveManualOrder()">Criar pedido</button>`);
}
function saveManualOrder(){
  const g=x=>document.getElementById(x); const nome=g("no_nome").value.trim(); if(!nome){toast("Informe o cliente.");return;}
  const total=parseFloat(g("no_total").value)||0; const taxa=DB.settings.taxa||7;
  const o={id:uid("o"),numero:pad4(DB.seq++),cliente:nome,whatsapp:g("no_wpp").value.trim(),endereco:(g("no_end").value.trim()+(g("no_num")&&g("no_num").value.trim()?", "+g("no_num").value.trim():"")),
    bairro:g("no_bairro").value.trim(),pagamento:g("no_pag").value,troco:"",itens:[{n:g("no_itens").value.trim()||"Itens diversos",q:1,p:Math.max(0,total-taxa)}],
    subtotal:Math.max(0,total-taxa),taxa,total,obs:g("no_obs").value.trim(),status:"novo",maioridade:true,docConferido:null,entregaAutorizada:null,
    motivoCancel:"",entregador:"",criadoEm:nowISO(),historico:[{ts:nowISO(),de:null,para:"novo",user:OP||"admin (manual)"}]};
  DB.orders.unshift(o); if(sbActive()){ sbPostOrder(o).then(function(rows){ if(rows&&rows[0]&&rows[0].id){ o.id=rows[0].id; store.save(); } }); } refresh(); go("pedidos"); toast("Pedido #"+o.numero+" criado no kanban.");
}

   INIT
   ============================================================ */
function boot(){
  if(sbActive()){ CONFIG.supabaseUrl=SUPA_ADMIN.url; CONFIG.supabaseKey=SUPA_ADMIN.key; }
  else if(DB.settings.supabaseUrl){ CONFIG.supabaseUrl=DB.settings.supabaseUrl; CONFIG.supabaseKey=DB.settings.supabaseKey; }
  document.getElementById("liveLabel").textContent=CONFIG.supabaseUrl?"supabase":"demo";
  CURRENT="dashboard"; renderSidebar(); VIEWS.dashboard();
  if(sbActive()){ sbSyncOrders().then(function(){ if(CURRENT==="dashboard") VIEWS.dashboard(); }); sbStartPolling(); }
}
(function init(){
  store.load();
  let sess=null; try{ sess=JSON.parse(localStorage.getItem("viracopo_session")); }catch(e){}
  if(sess && sess.op){ OP=sess.op; document.getElementById("login").style.display="none"; document.getElementById("shell").classList.add("on"); boot(); }
  const pf=document.getElementById("loginPass"); if(pf) pf.addEventListener("keydown",function(e){ if(e.key==="Enter") doLogin(); });
})();
</script>
